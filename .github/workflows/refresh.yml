name: Refresh Kitchen Schedule

on:
  schedule:
    - cron: "0,15,30,45 * * * *"   # every 15 minutes
  workflow_dispatch:                 # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch schedule and generate HTML
        env:
          TFC_EMAIL:    ${{ secrets.TFC_EMAIL }}
          TFC_PASSWORD: ${{ secrets.TFC_PASSWORD }}
          OUTPUT_FILE:  index.html
        run: python scripts/fetch_schedule.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: index.html
